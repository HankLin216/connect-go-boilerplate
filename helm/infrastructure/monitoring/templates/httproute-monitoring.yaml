{{- if .Values.gateway.enabled -}}
# HTTPRoute for Grafana (/grafana)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "connect-go-monitoring.fullname" . }}-grafana
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      {{- if .Values.gateway.namespace }}
      namespace: {{ .Values.gateway.namespace }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: {{ .Values.grafana.serviceName }}
          port: {{ .Values.grafana.port }}
---
# HTTPRoute for Prometheus (/prometheus)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "connect-go-monitoring.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      {{- if .Values.gateway.namespace }}
      namespace: {{ .Values.gateway.namespace }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      backendRefs:
        - name: {{ .Values.prometheus.serviceName }}
          port: {{ .Values.prometheus.port }}
{{- end }}
