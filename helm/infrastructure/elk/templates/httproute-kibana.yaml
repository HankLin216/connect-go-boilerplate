{{- if .Values.gateway.enabled -}}
# HTTPRoute for Kibana (/kibana)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "connect-go-elk.fullname" . }}-kibana
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      {{- if .Values.gateway.namespace }}
      namespace: {{ .Values.gateway.namespace }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kibana
      backendRefs:
        - name: kibana-kb-http
          port: 5601
{{- end }}
