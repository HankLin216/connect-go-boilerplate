{{- if .Values.logstash.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: {{ .Release.Namespace | quote }}
spec:
  replicas: {{ .Values.logstash.replicas }}
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      # Init container to wait for Elasticsearch to be ready
      initContainers:
        - name: wait-for-es
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Elasticsearch..."
              until wget -q -O /dev/null http://${ELASTICSEARCH_USERNAME}:${ELASTICSEARCH_PASSWORD}@elasticsearch-es-http:9200 2>/dev/null; do
                echo "  Elasticsearch not ready, retrying in 5s..."
                sleep 5
              done
              echo "Elasticsearch is ready!"
          env:
            - name: ELASTICSEARCH_USERNAME
              value: {{ .Values.elasticsearch.auth.username | default "elastic" | quote }}
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-es-elastic-user
                  key: elastic
      containers:
        - name: logstash
          image: {{ .Values.logstash.image }}
          ports:
            - containerPort: 5044
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          resources:
            {{- toYaml .Values.logstash.resources | nindent 12 }}
          env:
            - name: LS_JAVA_OPTS
              value: "-Xmx256m -Xms256m"
            - name: ELASTICSEARCH_USERNAME
              value: {{ .Values.elasticsearch.auth.username | default "elastic" | quote }}
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-es-elastic-user
                  key: elastic
      volumes:
        - name: config
          configMap:
            name: logstash-config
{{- end }}
