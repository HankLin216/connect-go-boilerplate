{{- if .Values.gateway.enabled }}
# HTTPRoute for Jaeger UI (/jaeger)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "connect-go-tracing.fullname" . }}-jaeger
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      {{- if .Values.gateway.namespace }}
      namespace: {{ .Values.gateway.namespace }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jaeger
      backendRefs:
        - name: jaeger
          port: 16686
{{- end }}
