# Default values for connect-go-boilerplate

# ============================================================================
# Gateway Configuration
#
# For fresh environments (new Gateway per app):
#   gateway.enabled = true (default)
#   → This chart creates its own Gateway resource.
#
# For existing environments (shared Gateway):
#   gateway.enabled = false
#   gateway.name = "shared-gw"
#   gateway.namespace = "infra"   # optional, if Gateway is in another namespace
#   → This chart creates only Routes, pointing to the existing Gateway.
#
# The GatewayClass + EnvoyProxy are cluster-level, managed by:
#   helm/infrastructure/envoy-gateway/install.sh
# ============================================================================
gateway:
  enabled: true
  name: connect-gw
  className: envoy-gateway
  # Port for the Gateway Listener (External access)
  # When using Rancher Desktop/K3s, this port will be bound to the Host machine.
  port: 30080
  # Set this if using an existing Gateway in another namespace (set enabled=false first)
  namespace: ""

# ============================================================================
# Keycloak (Identity & Access Management)
# ============================================================================
keycloak:
  enabled: true
  name: connect-gw-keycloak
  instances: 1
  hostname: localhost
  relativePath: "/auth"
  realm:
    name: connect-go
  image:
    repository: quay.io/keycloak/keycloak
    tag: 26.0.5
  admin:
    secretName: basic-auth
    username: admin
    password: admin
  service:
    port: 8080
  db:
    secretName: keycloak-db-secret

# ============================================================================
# PostgreSQL (Keycloak Database)
# ============================================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: password
    database: keycloak
    username: postgres
  fullnameOverride: postgres
  primary:
    persistence:
      size: 1Gi
    initdb:
      scripts:
        init_db.sql: "CREATE DATABASE keycloak;"
    service:
      type: NodePort

# ============================================================================
# Application (connect-go-boilerplate)
# ============================================================================
connectGoBoilerplate:
  # Replica count
  replicaCount: 2

  # Image configuration
  image:
    registry: docker.io
    repository: library/connect-go-boilerplate
    tag: latest
    pullPolicy: IfNotPresent

  # ImagePullSecrets for private registry authentication
  imagePullSecrets: []
    # - name: harbor-secret

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 9000
    # nodePort: 30000
    name: connect-go-boilerplate

  # Resources limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  # Health check - Liveness Probe (gRPC)
  livenessProbe:
    grpc:
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Health check - Readiness Probe (gRPC)
  readinessProbe:
    grpc:
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

# ============================================================================
# ELK Stack — Managed by separate Helm chart: helm/infrastructure/elk/
# Install: bash helm/infrastructure/elk/install.sh [NAMESPACE]
# ============================================================================

# ============================================================================
# Monitoring — Managed by separate Helm chart: helm/infrastructure/monitoring/
# Install: bash helm/infrastructure/monitoring/install.sh [NAMESPACE]
# ============================================================================
