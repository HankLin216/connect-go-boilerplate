{{- if .Values.keycloak.enabled }}
# HTTPRoute for Keycloak (/auth)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "connect-go-boilerplate.fullname" . }}-keycloak
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      {{- if .Values.gateway.namespace }}
      namespace: {{ .Values.gateway.namespace }}
      {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: {{ .Values.keycloak.name }}-service
          port: {{ .Values.keycloak.service.port }}
{{- end }}
